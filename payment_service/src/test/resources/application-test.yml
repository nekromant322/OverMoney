server:
  port: 8084
  address: localhost

integration:
  internal:
    host:
      orchestrator: http://localhost:8081
      recognizer: http://localhost:8080

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  liquibase:
    enabled: false
  cache:
    type: none
robokassa:
  merchant:
    login: test_merchant
  password:
    one: test_pass1
    two: test_pass2
  api:
    url: https://test.robokassa.ru

orchestrator:
  host: test.ru