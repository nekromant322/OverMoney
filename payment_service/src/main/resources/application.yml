environment: ${ENVIRONMENT:dev}

server:
  port: 8080

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://${PAYMENT_DB_HOST:localhost}:${PAYMENT_DB_PORT:5436}/payments-db
    username: ${PAYMENT_DB_USER:postgres}
    password: ${PAYMENT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        current_session_context_class: org.springframework.orm.hibernate5.SpringSessionContext

  liquibase:
    enabled: true
    change-log: /db/changelog/db.changelog-master.xml

  profiles:
    active: ${SPRING_APPLICATION_PROFILE:dev}


logging:
  level:
    org.zalando.logbook: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,gitInfo
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

authorization-header:
  header-value: ${INTERNAL_KEY_HEADER:X-INTERNAL-KEY}

mask-log-spring-boot-starter:
  maskedFields:
    - x-internal-key

yookassa:
  shop-id: ${YOOKASSA_SHOP_ID}
  secret-key: ${YOOKASSA_SECRET_KEY}
  url: https://api.yookassa.ru/v3

subscription:
  duration:
    months: 1
  payment:
    timeout-minutes: 10