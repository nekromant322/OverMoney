services:
  orchestrator-service:
    container_name: orchestrator
    image: ghcr.io/nekromant322/orchestrator:latest
    restart: unless-stopped
    ports:
      - '8081:8080'
    environment:
      _JAVA_OPTIONS: -Xmx256m
      ORCHESTRATOR_DB_USER: ${ORCHESTRATOR_DB_USER}
      ORCHESTRATOR_DB_PASSWORD: ${ORCHESTRATOR_DB_PASSWORD}
      ORCHESTRATOR_DB_HOST: ${ORCHESTRATOR_DB_HOST}
      ORCHESTRATOR_DB_PORT: ${ORCHESTRATOR_DB_PORT}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME}
      JWT_ACCESS_KEY: ${JWT_ACCESS_KEY}
      JWT_REFRESH_KEY: ${JWT_REFRESH_KEY}
      SPRING_APPLICATION_PROFILE: ${SPRING_APPLICATION_PROFILE}
      INTERNAL_KEY_HEADER: ${INTERNAL_KEY_HEADER}
    logging:
      driver: "json-file"
      options:
        max-size: 50m
    networks:
      - app-network

  recognizer-service:
    container_name: recognizer
    image: ghcr.io/nekromant322/recognizer:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      _JAVA_OPTIONS: -Xmx512m
      SPRING_APPLICATION_PROFILE: ${SPRING_APPLICATION_PROFILE}
      WIT_AI_TOKEN: ${WIT_AI_TOKEN}
      INTERNAL_KEY_HEADER: ${INTERNAL_KEY_HEADER}
      DEEPSEEK_AUTH_TOKEN: ${DEEPSEEK_AUTH_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: 50m
    networks:
      - app-network

  payment-service:
    container_name: payment
    image: ghcr.io/nekromant322/payment:latest
    restart: unless-stopped
    ports:
      - '8084:8080'
    environment:
      _JAVA_OPTIONS: -Xmx256m
      SPRING_APPLICATION_PROFILE: ${SPRING_APPLICATION_PROFILE}
      INTERNAL_KEY_HEADER: ${INTERNAL_KEY_HEADER}
      PAYMENT_DB_HOST: ${PAYMENT_DB_HOST}
      PAYMENT_DB_PORT: ${PAYMENT_DB_PORT}
      PAYMENT_DB_USER: ${PAYMENT_DB_USER}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      ROBOKASSA_LOGIN_SHOP_ID: ${ROBOKASSA_LOGIN_SHOP_ID}
      ROBOKASSA_PASSWORD_ONE: ${ROBOKASSA_PASSWORD_ONE}
      ROBOKASSA_PASSWORD_TWO: ${ROBOKASSA_PASSWORD_TWO}
    logging:
      driver: "json-file"
      options:
        max-size: 50m
    networks:
      - app-network

  wit-ai-go-proxy-service:
    container_name: wit-ai-go-proxy
    image: ghcr.io/nekromant322/wit_ai_go_proxy:latest
    restart: unless-stopped
    ports:
      - '3333:8080'
    environment:
      WIT_AI_TOKEN: ${WIT_AI_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: 50m
    networks:
      - app-network

  telegram-bot-service:
    container_name: telegram-bot
    image: ghcr.io/nekromant322/telegram_bot:latest
    restart: unless-stopped
    ports:
      - '8082:8080'
    environment:
      _JAVA_OPTIONS: -Xmx256m
      TELEGRAM_BOT_DB_USER: ${TELEGRAM_BOT_DB_USER}
      TELEGRAM_BOT_DB_PASSWORD: ${TELEGRAM_BOT_DB_PASSWORD}
      TELEGRAM_BOT_DB_HOST: ${TELEGRAM_BOT_DB_HOST}
      TELEGRAM_BOT_DB_PORT: ${TELEGRAM_BOT_DB_PORT}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME}
      SPRING_APPLICATION_PROFILE: ${SPRING_APPLICATION_PROFILE}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL}
      INTERNAL_KEY_HEADER: ${INTERNAL_KEY_HEADER}
    logging:
      driver: "json-file"
      options:
        max-size: 50m
    networks:
      - app-network

  frontend-app-service:
    container_name: frontend-app
    image: ghcr.io/nekromant322/frontend_app:latest
    restart: unless-stopped
    ports:
      - '8085:80'
    logging:
      driver: "json-file"
      options:
        max-size: 50m
    networks:
      - app-network


networks:
  app-network:
    driver: bridge