environment: argo-cd
rules:
  - host: overmoneytest.online
    paths:
      - path: /argo-cd
        pathType: Prefix
        backend:
          service:
            name: 'argo-cd-argocd-server'
            port:
              number: 80
      - path: /argo-cd
        pathType: Prefix
        backend:
          service:
            name: 'argo-cd-argocd-server'
            port:
              number: 443
annotations:
  nginx.ingress.kubernetes.io/ssl-redirect: false
  nginx.ingress.kubernetes.io/backend-protocol: HTTP